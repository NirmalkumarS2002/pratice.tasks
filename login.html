<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login-Page</title>


    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,-50..200" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Work Sans", sans-serif;
        }

        html,
        body {
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        :root {
            --pcolor: #603BFE;
            --pcolor1: #7B2FF7;
            --hcolor: #9147FF;
            --dark: #1F1F1F;
            --ncolor: #bd00f7;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 100vh;
            padding: 10px;
        }

        .loginpage {
            display: grid;
            grid-template-columns: 1fr 1fr;
            max-width: 1200px;
            width: 100%;
            position: relative;
            overflow: hidden;
            box-shadow: 1px 1px 30px gray;
            padding: 10px;
        }

        .loginpage::before {
            content: "";
            background: linear-gradient(125deg, #7923fa, #ee3bfeb0, rgba(3, 149, 207, 0.644)), url("./src/polygon.webp");
            position: absolute;
            inset: 0;
            clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% -60%);
        }




        .section1 {
            background: white;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 20px;
            width: 100%;
            gap: 5px;
        }

        .section1 h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .login-header {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }


        .login-header p,
        .login-header a {
            font-size: 15px;
            text-decoration: none;
        }

        .login-header a {
            color: #bd00f7;
        }

        .loginform {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .inputbox {
            position: relative;
        }

        .inputbox input,
        .inputbox select {
            padding: 15px 30px;
            width: 100%;
            border-radius: 7px;
            background: white;
            border: 1px solid rgba(128, 128, 128, 0.308);
        }

        .inputbox input:focus {
            border: 1px solid var(--hcolor);
            outline: none;
        }

        .inputbox span {
            font-size: 20px;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            left: 5px;
            color: var(--ncolor);

        }

        .perror {
            font-size: 13px;
            margin-top: 5px;
        }

        .box {
            display: flex;
            justify-content: space-between;
            padding-block: 20px;
        }

        .box .fotget {
            color: var(--ncolor);
            text-decoration: none;
            font-size: 15px;
        }

        .check {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .check label {
            font-size: 15px;
        }

        .loginbtn {
            padding: 13px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 7px;
            border: none;
            background: linear-gradient(125deg, #9147FF, #ea47ff);
            color: white;
            transition: .6s ease;
        }

        .loginbtn:hover {
            transform: translateY(-5px);
            box-shadow: 1px 1px 10px #9147FF;
        }

        .loginfooter {
            display: flex;
            align-items: center;
            width: 100%;
            margin-block: 20px;
            gap: 10px;
        }

        .footericons {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .footericons a {
            font-size: 30px;
            background: white;
            padding: 1px 40px;
            border-radius: 5px;
            transition: .6s ease;
        }

        .footericons a:hover {
            transform: scale(1.05);
            box-shadow: 1px 1px 10px rgba(0, 0, 0, 0.733);
        }

        .footericons a:first-child {
            background: #4767A0;
            font-size: 25px;
            padding: 4px 40px;
            color: white;
        }

        .footericons a:last-child {
            background: green;
            color: white;
        }

        .homebtn {
            text-decoration: none;
            font-size: 15px;
            text-transform: capitalize;
            color: var(--ncolor);
            margin-top: 20px;
        }

        .homebtn i {
            font-size: 15px;
            color: var(--ncolor);
        }

        .section2 {
            background: white;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            padding: 20px;
        }

        .logo {
            width: 160px;
            margin-bottom: 10px;
            z-index: 9999;
        }

        .section2 h1 {
            font-size: 50px;
            max-width: 250px;
            text-align: end;
            margin-bottom: 10px;
            z-index: 9999;
            color: white;
        }

        .section2 p {
            max-width: 250px;
            text-align: end;
            line-height: 1.5;
            z-index: 9999;
            font-size: 14px;
            color: white;
        }

        @media (max-width:800px) {
            .loginpage {
                grid-template-columns: 1fr;
            }

            .loginpage::before {
                display: none;
            }

            .section1 {
                align-items: center;
                order: 2;
            }

            .section1 h1 {
                font-size: 30px;
            }

            .login-header {
                flex-direction: column;
                gap: 5px;
                text-align: center;
            }

            .box {
                flex-direction: column;
                justify-content: center;
                text-align: center;
                gap: 10px;
            }


            .loginfooter {
                flex-direction: column;
                justify-content: center;
            }

            .section2 {
                order: 1;
                align-items: center;
                position: relative;
            }

            .section2::before {
                content: "";
                background: linear-gradient(125deg, #7923fa, #ee3bfeb0, rgba(3, 149, 207, 0.644)), url("./src/polygon.webp");
                position: absolute;
                inset: 0;
            }

            .section2 img {
                width: 150px;
            }


            .section2 h1 {
                text-align: center;
                font-size: 40px;

            }

            .section2 p {
                text-align: center;
                font-size: 15px;
            }

            .check {
                justify-content: center;
            }
        }

        input[type="password"]::-ms-reveal,
        input[type="password"]::-ms-clear {
            display: none;
        }

        .custom-dropdown {
            position: relative;
            width: 100%;
        }

        .selected-option {
            padding: 12px 3px;
            border: 1px solid #ddd;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            background: white;
            transition: .3s;
        }

        .selected-option .ic {
            font-size: 22px;
            color: var(--ncolor);
        }

        .selected-option:hover {
            border-color: #9147FF;
        }

        .selected-text {
            flex: 1;
            font-size: 13px;
        }

        .arrow {
            color: #9147FF;
            transition: .3s;
        }

        .dropdown-list {
            position: absolute;
            top: 110%;
            left: 0;
            width: 100%;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .1);
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px);
            transition: .3s ease;
            z-index: 100;
        }

        .custom-dropdown.active .dropdown-list {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .custom-dropdown.active .arrow {
            transform: rotate(180deg);
        }

        .option {
            padding: 15px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: .3s;
        }

        .option:hover {
            background: linear-gradient(90deg, #9147FF, #d946ef);
            color: white;
        }
    </style>
</head>



<body>

    <div class="loginpage">
        <div class="section1">
            <h1>Sign Up</h1>

            <div class="login-header">
                <p>Already have an account?</p>
                <a href="login.html">Login Here</a>

            </div>

            <div class="loginform">

                <div class="custom-dropdown">
                    <div class="selected-option">
                        <span class="material-symbols-outlined ic">person</span>
                        <span class="selected-text">Select Your Role</span>
                        <span class="material-symbols-outlined arrow ic">keyboard_arrow_down</span>
                    </div>

                    <div class="dropdown-list">
                        <div class="option" data-value="Admin">

                            Admin
                        </div>

                        <div class="option" data-value="Client">

                            Traveler
                        </div>
                    </div>

                    <p class="perror"></p>

                    <input type="hidden" id="role">
                </div>

                <div class="inputwrap">
                    <div class="inputbox">
                        <span class="material-symbols-outlined callicon">call</span>
                        <input type="text" id="name" placeholder="Enter Your Name">
                    </div>
                    <p class="perror"></p>
                </div>


                <div class="inputwrap">
                    <div class="inputbox">
                        <span class="material-symbols-outlined callicon">call</span>
                        <input type="text" id="number" placeholder="Enter Your Number">
                    </div>
                    <p class="perror"></p>
                </div>

                <div class="inputwrap">
                    <div class="inputbox">
                        <span class="material-symbols-outlined callicon">email</span>
                        <input type="email" id="email" placeholder="Enter Your Email">
                    </div>
                    <p class="perror"></p>
                </div>

                <div class="inputwrap">
                    <div class="inputbox">
                        <span class="material-symbols-outlined callicon passeye">visibility_off</span>
                        <input type="password" id="password" placeholder="Enter Your Password">
                    </div>
                    <p class="perror"></p>
                </div>

                <div class="inputwrap">
                    <div class="inputbox">
                        <span class="material-symbols-outlined callicon passeye">visibility_off</span>
                        <input type="password" id="conpassword" placeholder="Enter Your Confirm password">
                    </div>
                    <p class="perror"></p>
                </div>



                <button class="loginbtn">Login</button>
            </div>

            <a href="index.html" class="homebtn"><i class="fa-regular fa-house"></i> back to home</a>



        </div>

        <div class="section2">
            <img src="./src/logo.webp" alt="Company Logo" class="logo">

            <h1>Start Your Journey</h1>

            <p>Create your account to book flights, manage trips, and explore destinations around the world.</p>
        </div>
    </div>

    <script>

        const loginbtn = document.querySelector(".loginbtn")
        const role = document.querySelector("#role")
        const name2 = document.querySelector("#name")
        const number = document.querySelector("#number")
        const email = document.querySelector("#email")
        const password = document.querySelector("#password")
        const conpassword = document.querySelector("#conpassword")
        const errors = document.querySelectorAll(".perror")

        name2.addEventListener("input", () => {
            name2.value = name2.value.replace(/[^A-Za-z\s]/g, "")
        })

        number.addEventListener("input", () => {
            number.value = number.value.replace(/[^0-9]/g, "").slice(0, 10)
        })


        loginbtn.addEventListener("click", () => {

            const frole = role.value.trim()
            const fname = name2.value.trim()
            const fnumber = number.value.trim()
            const femail = email.value.trim()
            const fpass = password.value.trim()
            const cpass = conpassword.value.trim()

            let isvalid = true;

            const emailregex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/

            errors.forEach((error) => {
                error.textContent = "";
                error.style.color = "#bd00f7"
            })


            if (frole == "") {
                errors[0].textContent = "Please Select Your Role"
                isvalid = false;
            }

            if (fname == "") {
                errors[1].textContent = "Please Enter Your Name"
                isvalid = false;
            }

            if (fnumber == "") {
                errors[2].textContent = "Please Enter Your Number"
                isvalid = false;
            }

            if (femail == "") {
                errors[3].textContent = "Please Enter Your Email"
                isvalid = false;
            }

            else if (!emailregex.test(femail)) {
                errors[3].textContent = "Please Enter Valid Email"
                isvalid = false;
            }


            if (fpass == "") {
                errors[4].textContent = "Please Enter Your Password"
                isvalid = false;
            }

            else if (password.value.length < 6) {
                errors[4].textContent = "Password must be in 6 chars"
                isvalid = false;
            }

            if (cpass == "") {
                errors[5].textContent = "Please Enter Your Password"
                isvalid = false;
            }

            else if (cpass !== fpass) {
                errors[5].textContent = "password and confirm password must be same"
                isvalid = false;
            }

            if (isvalid) {
                alert("Sign Up Successfully!")
                window.location.href = "login.html"
            }

        })


        //pass eye

        const passEyes = document.querySelectorAll(".passeye");

        passEyes.forEach((passeye)=>{
            passeye.addEventListener("click",()=>{

                let input=passeye.nextElementSibling;

                if(input.type=="password"){
                    passeye.textContent="visibility"
                    input.type="text"
                }
                else{
                    passeye.textContent="visibility_off"
                    input.type="password"
                }
            })
        })  

        


        //dropdown

        const dropdown = document.querySelector(".custom-dropdown");
        const selected = document.querySelector(".selected-option");
        const selectedText = document.querySelector(".selected-text");
        const options = document.querySelectorAll(".option");
        const roleInput = document.querySelector("#role");

        selected.addEventListener("click", () => {
            dropdown.classList.toggle("active");
        });

        options.forEach(option => {
            option.addEventListener("click", () => {
                selectedText.textContent = option.textContent.trim();
                roleInput.value = option.dataset.value;

                dropdown.classList.remove("active");
            });
        });

        document.addEventListener("click", (e) => {
            if (!dropdown.contains(e.target)) {
                dropdown.classList.remove("active");
            }
        });



    </script>
</body>

</html>
