<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            overflow-x: hidden;
        }

        body {
            padding: 10px;
            position: relative;
        }

        .loader{
            position: fixed;
            height: 100vh;
            width: 100%;
            background: black;
            inset: 0;
        }
        .header {
            background: red;
            position: fixed;
            width: calc(100% - 20px);
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        

        .header.active {
            background: black;
        }

          .header.active .h1text{
            color: white;
         }

    
        .header img {
            width: 160px;
        }

        .herowrap {
            width: 100%;
            height: 100vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .hero {
            background: url("./src/cat1.webp");
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            width: 600px;
            height: 600px;
        }

        .btns button {
            position: absolute;
            padding: 20px;
            top: 50%;
        }

        .left {
            left: 10px;
        }

        .right {
            right: 10px;
        }

        .about {
            min-height: 100vh;
            width: 100%;
            background: linear-gradient(red, blue);
            filter: blur(20px);
        }

        .fixed {
            width: 50px;
            height: 50px;
            background: green;
            position: fixed;
            bottom: 20px;
            right: 20px;
        }
    </style>

</head>

<body>

    <div class="loader">
            <div class="load">

            </div>
    </div>

    <div class="header">
        <img src="./src/logo.webp" alt="">
        <h2 class="h1text">hello</h2>
    </div>

    <div class="herowrap">
        <div class="hero">

        </div>
          <div class="btns">
        <button class="left">left</button>
        <button class="right">right</button>
    </div>
    </div>

    <div class="about">

    </div>

  

    <div class="fixed">
        arrow
    </div>
</body>

<script>

    let left = document.querySelector(".left")
    let right = document.querySelector(".right")
    let hero = document.querySelector(".hero")
    let image = ["./src/cat1.webp", "./src/cat2.webp", "./src/cat3.webp"]
    let index = 0

    //setInterval(()=>{
    //    index=(index+1)%image.length;
    //    hero.style.background=`url(${image[index]}) center/cover no-repeat`
    //},3000)

    //setInterval(() => {
    //    index++
    //    if (image.length - 1 < index) {
    //        index = 0
    //    }
    //    hero.style.background = `url(${image[index]}) center/cover no-repeat`
    //}, 2000)

    right.addEventListener("click", () => {
        index++
        if (image.length - 1 < index) {
            index = 0
        }
        hero.style.background = `url(${image[index]}) center/cover no-repeat`
    })

    left.addEventListener("click", () => {
        index--
        if (index < 0) {
            index = image.length - 1
        }
        hero.style.background = `url(${image[index]}) center/cover no-repeat`
    })

    //fixed

    let fix=document.querySelector(".fixed")
    fix.addEventListener("click",()=>{
        window.scrollTo({
            top:0,
            behavior:"smooth" 
        })
    })
    //header
    const header=document.querySelector(".header")
    window.addEventListener("scroll",()=>{
        if(window.scrollY>50){
            header.classList.add("active")
        }
        else{
            header.classList.remove("active")
        }
    })

</script>

</html>
